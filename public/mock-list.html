<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock — รายการของฉัน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafaf8; font-family: 'Prompt', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
    .jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
    .header { padding: 24px 16px 12px; display: flex; flex-direction: column; gap: 16px; }
    .brand { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 14px; color: #c4855a; letter-spacing: 0.04em; }
    .page-title { font-weight: 600; font-size: 32px; color: #3d2b1a; line-height: 1.1; }
    .summary-card { background: #f3ffeb; border: 1px solid #c4d8b6; border-radius: 16px; padding: 24px; }
    .summary-inner { display: flex; align-items: center; justify-content: space-between; }
    .summary-col { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .summary-label { font-weight: 300; font-size: 12px; color: #9c7a5b; }
    .summary-value { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 28px; color: #e2c9a6; line-height: 1; }
    .summary-value.price { color: #c4855a; }
    .summary-divider { width: 1px; height: 57px; background: #c4d8b6; flex-shrink: 0; }
    .publisher-list { display: flex; flex-direction: column; gap: 16px; padding: 12px 16px 100px; }
    .publisher-card { background: white; border: 1px solid #fff8ee; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .publisher-row { display: flex; gap: 8px; align-items: flex-start; }
    .publisher-toggle { display: flex; flex: 1; min-width: 0; gap: 16px; align-items: flex-start; cursor: pointer; }
    .chevron { width: 24px; height: 24px; flex-shrink: 0; color: #9c7a5b; transition: transform 0.2s; }
    .chevron.open { transform: rotate(-90deg); }
    .booth-num { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 24px; color: #3d2b1a; line-height: 1; width: 56px; }
    .pub-name-col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
    .pub-name { font-weight: 500; font-size: 16px; color: #3d2b1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pub-name-en { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; font-size: 12px; color: #3d2b1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .remove-btn { flex-shrink: 0; width: 32px; height: 32px; border-radius: 20px; background: #fff8ee; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .divider { height: 1px; background: #f0e4d4; }
    .books-list { display: flex; flex-direction: column; gap: 8px; background: #fff8ee; border-radius: 8px; padding: 12px; }
    .book-row { display: flex; align-items: center; justify-content: space-between; }
    .book-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .checkbox { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #9c7a5b; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .checkbox.checked { background: #8fad7a; border-color: #8fad7a; }
    .book-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; color: #6a7282; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-title.purchased { text-decoration: line-through; color: #a6a09b; }
    .book-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 8px; }
    .book-price { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; color: #6a7282; }
    .book-price.purchased { text-decoration: line-through; color: #a6a09b; }
    .icon-btn { background: none; border: none; cursor: pointer; color: #9c7a5b; display: flex; align-items: center; padding: 0; }
    .add-book-btn { display: flex; align-items: center; justify-content: center; gap: 4px; width: 100%; background: none; border: none; cursor: pointer; }
    .add-book-btn span { font-size: 16px; color: #c4855a; }

    /* Edit form */
    .edit-form { display: flex; flex-direction: column; gap: 6px; }
    .edit-input { width: 100%; height: 32px; border-radius: 8px; border: 1px solid #f0e4d4; background: #fafaf8; padding: 0 8px; font-family: 'Prompt', sans-serif; font-weight: 300; font-size: 14px; color: #3d2b1a; outline: none; transition: border-color 0.15s; }
    .edit-input:focus { border-color: #973c00; }
    .edit-row { display: flex; align-items: center; gap: 6px; }
    .edit-price-input { flex: 1; min-width: 0; height: 32px; border-radius: 8px; border: 1px solid #f0e4d4; background: #fafaf8; padding: 0 8px; font-family: 'Prompt', sans-serif; font-weight: 300; font-size: 14px; color: #3d2b1a; outline: none; transition: border-color 0.15s; }
    .edit-price-input:focus { border-color: #973c00; }
    .save-btn { flex-shrink: 0; height: 32px; padding: 0 10px; border-radius: 8px; background: #c4855a; border: none; font-family: 'Prompt', sans-serif; font-size: 13px; color: white; cursor: pointer; }
    .save-btn:disabled { background: #e2c9a6; cursor: default; }
    .cancel-btn { flex-shrink: 0; background: none; border: none; cursor: pointer; color: #9c7a5b; display: flex; align-items: center; }

    /* Add book form */
    .add-form { display: flex; flex-direction: column; gap: 8px; }
    .add-input { height: 48px; width: 100%; border-radius: 16px; border: 1px solid #f0e4d4; background: #fafaf8; padding: 0 12px; font-family: 'Prompt', sans-serif; font-weight: 300; font-size: 14px; color: #3d2b1a; outline: none; transition: border-color 0.15s; }
    .add-input:focus { border-color: #973c00; }
    .add-form-row { display: flex; gap: 8px; align-items: flex-start; }
    .add-price-input { flex: 1; height: 48px; border-radius: 16px; border: 1px solid #f0e4d4; background: #fafaf8; padding: 0 12px; font-family: 'Prompt', sans-serif; font-weight: 300; font-size: 14px; color: #3d2b1a; outline: none; transition: border-color 0.15s; }
    .add-price-input:focus { border-color: #973c00; }
    .add-save-btn { flex-shrink: 0; height: 48px; padding: 0 17px; border-radius: 12px; background: #c4855a; border: 1px solid #c4855a; font-family: 'Prompt', sans-serif; font-size: 16px; color: white; cursor: pointer; }
    .add-cancel-btn { flex-shrink: 0; height: 48px; padding: 0 17px; border-radius: 12px; background: #fafaf8; border: 1px solid #e2c9a6; font-family: 'Prompt', sans-serif; font-size: 16px; color: #c4855a; cursor: pointer; }

    /* Bottom nav mock */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 68px; background: white; border-top: 1px solid #f0e4d4; display: flex; align-items: center; justify-content: space-around; padding: 0 16px; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; opacity: 0.4; }
    .nav-item.active { opacity: 1; color: #c4855a; }
    .nav-label { font-size: 10px; color: #9c7a5b; }
    .nav-item.active .nav-label { color: #c4855a; }

    /* Toast */
    .toast { position: fixed; bottom: 84px; left: 16px; right: 16px; max-width: calc(480px - 32px); margin: 0 auto; z-index: 20; animation: toast-in 0.25s ease-out; }
    .toast-inner { display: flex; align-items: center; justify-content: space-between; height: 61px; padding: 0 16px; background: #f0e4d4; border: 1px solid #c4855a; border-radius: 8px; }
    .toast-text { font-size: 16px; color: #3d2b1a; display: flex; align-items: center; gap: 8px; }
    .toast-undo { font-weight: 500; font-size: 16px; color: #973c00; background: none; border: none; cursor: pointer; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    svg { display: block; }
  </style>
</head>
<body>

<div style="flex:1; overflow-y:auto; padding-bottom: 68px;">
  <!-- Header -->
  <div class="header">
    <div class="pub-name-col">
      <span class="brand jakarta">BOOK FAIR BUDDY</span>
      <p class="page-title">รายการของฉัน</p>
    </div>
    <div class="summary-card">
      <div class="summary-inner">
        <div class="summary-col">
          <span class="summary-label">จำนวนบูธ</span>
          <span class="summary-value jakarta" id="booth-count">2</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-col" style="width:64px">
          <span class="summary-label">หนังสือ</span>
          <span class="summary-value jakarta" id="book-count">3</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-col">
          <span class="summary-label">ราคา</span>
          <span class="summary-value price jakarta" id="total-price">฿890</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Publisher list -->
  <div class="publisher-list" id="publisher-list"></div>
</div>

<!-- Bottom nav mock -->
<div class="bottom-nav">
  <div class="nav-item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9c7a5b" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">หน้าหลัก</span>
  </div>
  <div class="nav-item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9c7a5b" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">ค้นหา</span>
  </div>
  <div class="nav-item active">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c4855a" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <span class="nav-label" style="color:#c4855a">รายการ</span>
  </div>
  <div class="nav-item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9c7a5b" stroke-width="1.8"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
    <span class="nav-label">แผนที่</span>
  </div>
</div>

<script>
  const state = {
    publishers: [
      { id: 'p1', name_th: 'สำนักพิมพ์ผีเสื้อ', name_en: 'Butterfly Books', booth: 'K32' },
      { id: 'p2', name_th: 'นานมีบุ๊คส์', name_en: 'Nanmeebooks', booth: 'M05' },
    ],
    books: [
      { id: 'b1', publisher_id: 'p1', title: 'โลกใบใหม่', price: 350, is_purchased: false },
      { id: 'b2', publisher_id: 'p1', title: 'ดาวกระจาย', price: 290, is_purchased: true },
      { id: 'b3', publisher_id: 'p2', title: 'เพื่อนซี้', price: 250, is_purchased: false },
    ],
    expanded: new Set(['p1', 'p2']),
    editingBookId: null,
    addingFor: null,
  };

  function totalBudget() {
    return state.books.reduce((s, b) => s + (b.price ?? 0), 0);
  }

  function updateSummary() {
    document.getElementById('booth-count').textContent = state.publishers.length;
    document.getElementById('book-count').textContent = state.books.length;
    document.getElementById('total-price').textContent = '฿' + totalBudget().toLocaleString();
  }

  function render() {
    updateSummary();
    const list = document.getElementById('publisher-list');
    list.innerHTML = '';
    state.publishers.forEach(pub => {
      const pubBooks = state.books.filter(b => b.publisher_id === pub.id);
      const isExpanded = state.expanded.has(pub.id);
      const isAdding = state.addingFor === pub.id;

      const card = document.createElement('div');
      card.className = 'publisher-card';

      // Publisher row
      card.innerHTML = `
        <div class="publisher-row">
          <div class="publisher-toggle" onclick="toggleExpand('${pub.id}')">
            <div style="display:flex;align-items:flex-start;gap:4px;flex-shrink:0">
              <svg class="chevron ${isExpanded ? 'open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              <span class="booth-num jakarta">${pub.booth}</span>
            </div>
            <div class="pub-name-col">
              <span class="pub-name">${pub.name_th}</span>
              <span class="pub-name-en">${pub.name_en}</span>
              ${pubBooks.length > 0 && !isExpanded ? `<div style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:#f0e4d4;align-self:flex-start">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#973c00" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
                <span style="font-size:12px;color:#973c00;font-weight:300">${pubBooks.length} เล่ม</span>
              </div>` : ''}
            </div>
          </div>
          <button class="remove-btn" onclick="removePublisher('${pub.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e2c9a6" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      `;

      if (isExpanded) {
        const divider = document.createElement('div');
        divider.className = 'divider';
        card.appendChild(divider);

        if (isAdding) {
          const addForm = document.createElement('div');
          addForm.className = 'add-form';
          addForm.id = `add-form-${pub.id}`;
          addForm.innerHTML = `
            <input class="add-input" type="text" id="new-title-${pub.id}" placeholder="ชื่อหนังสือ" />
            <div class="add-form-row">
              <input class="add-price-input" type="number" inputmode="numeric" id="new-price-${pub.id}" placeholder="ราคา (บาท)" />
              <button class="add-save-btn" onclick="addBook('${pub.id}')">บันทึก</button>
              <button class="add-cancel-btn" onclick="cancelAdd()">ยกเลิก</button>
            </div>
          `;
          card.appendChild(addForm);
          setTimeout(() => document.getElementById(`new-title-${pub.id}`)?.focus(), 50);
        } else {
          if (pubBooks.length > 0) {
            const booksList = document.createElement('div');
            booksList.className = 'books-list';
            pubBooks.forEach(book => {
              const bookEl = document.createElement('div');
              if (state.editingBookId === book.id) {
                bookEl.className = 'edit-form';
                bookEl.innerHTML = `
                  <input class="edit-input" type="text" id="edit-title-${book.id}" value="${escHtml(book.title)}" placeholder="ชื่อหนังสือ" />
                  <div class="edit-row">
                    <input class="edit-price-input" type="number" inputmode="numeric" id="edit-price-${book.id}" value="${book.price ?? ''}" placeholder="ราคา" />
                    <button class="save-btn" onclick="saveBookEdit('${book.id}')">บันทึก</button>
                    <button class="cancel-btn" onclick="cancelEdit()">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  </div>
                `;
                booksList.appendChild(bookEl);
                setTimeout(() => document.getElementById(`edit-title-${book.id}`)?.focus(), 50);
              } else {
                bookEl.className = 'book-row';
                bookEl.innerHTML = `
                  <div class="book-left">
                    <button class="checkbox ${book.is_purchased ? 'checked' : ''}" onclick="togglePurchased('${book.id}')">
                      ${book.is_purchased ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
                    </button>
                    <span class="book-title ${book.is_purchased ? 'purchased' : ''}">${escHtml(book.title)}</span>
                  </div>
                  <div class="book-right">
                    ${book.price != null ? `<span class="book-price jakarta ${book.is_purchased ? 'purchased' : ''}">฿${book.price.toLocaleString()}</span>` : ''}
                    ${!book.is_purchased ? `
                      <button class="icon-btn" onclick="startEdit('${book.id}')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button class="icon-btn" onclick="deleteBook('${book.id}')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                    ` : ''}
                  </div>
                `;
                booksList.appendChild(bookEl);
              }
            });
            card.appendChild(booksList);
          }

          const addBtn = document.createElement('button');
          addBtn.className = 'add-book-btn';
          addBtn.onclick = () => startAdd(pub.id);
          addBtn.innerHTML = `
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c4855a" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>เพิ่มหนังสือ</span>
          `;
          card.appendChild(addBtn);
        }
      }

      list.appendChild(card);
    });
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function toggleExpand(id) {
    if (state.expanded.has(id)) { state.expanded.delete(id); if (state.addingFor === id) state.addingFor = null; }
    else state.expanded.add(id);
    render();
  }

  function startEdit(bookId) {
    state.editingBookId = bookId;
    state.addingFor = null;
    render();
  }

  function cancelEdit() { state.editingBookId = null; render(); }

  function saveBookEdit(bookId) {
    const titleEl = document.getElementById(`edit-title-${bookId}`);
    const priceEl = document.getElementById(`edit-price-${bookId}`);
    const title = titleEl?.value.trim();
    if (!title) return;
    const parsed = parseInt(priceEl?.value, 10);
    const price = priceEl?.value.trim() && !isNaN(parsed) ? parsed : null;
    state.books = state.books.map(b => b.id === bookId ? { ...b, title, price } : b);
    state.editingBookId = null;
    render();
    showToast('บันทึกแล้ว', null);
  }

  function deleteBook(bookId) {
    state.books = state.books.filter(b => b.id !== bookId);
    render();
    showToast('ลบหนังสือสำเร็จ', null);
  }

  function togglePurchased(bookId) {
    state.books = state.books.map(b => b.id === bookId ? { ...b, is_purchased: !b.is_purchased } : b);
    const book = state.books.find(b => b.id === bookId);
    if (book?.is_purchased) showToast('ซื้อหนังสือแล้ว 🎉', null);
    render();
  }

  function removePublisher(pubId) {
    state.publishers = state.publishers.filter(p => p.id !== pubId);
    state.books = state.books.filter(b => b.publisher_id !== pubId);
    render();
    showToast('ลบรายการสำเร็จ', null);
  }

  function startAdd(pubId) { state.addingFor = pubId; state.editingBookId = null; render(); }
  function cancelAdd() { state.addingFor = null; render(); }

  function addBook(pubId) {
    const titleEl = document.getElementById(`new-title-${pubId}`);
    const priceEl = document.getElementById(`new-price-${pubId}`);
    const title = titleEl?.value.trim();
    if (!title) return;
    const parsed = parseInt(priceEl?.value, 10);
    const price = priceEl?.value.trim() && !isNaN(parsed) ? parsed : null;
    const id = 'b' + Date.now();
    state.books.push({ id, publisher_id: pubId, title, price, is_purchased: false });
    state.addingFor = null;
    render();
  }

  let toastTimer = null;
  function showToast(msg, onUndo) {
    if (toastTimer) clearTimeout(toastTimer);
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
    t.innerHTML = `<div class="toast-inner"><span class="toast-text">${msg}</span>${onUndo ? `<button class="toast-undo" onclick="undoAction()">นำกลับมา</button>` : ''}</div>`;
    t.style.display = 'block';
    toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2500);
  }

  render();
</script>
</body>
</html>
